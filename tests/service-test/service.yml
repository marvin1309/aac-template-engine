---
# 1. CORE SERVICE IDENTITY
service:
  name: "aac-nextcloud"
  friendly_name: "Cloud"
  description: "Selfhosted Cloud Plattform"
  category: "Finanzen - Dokumente - Organisation"
  icon: "nextcloud.png"
  stage: "prod"
  hostname: "cloud"
  image_repo: "nextcloud"
  image_tag: "33.0.0"

# 2. PLATFORM INTEGRATIONS
config:
  domain_name: "int.fam-feser.de"
  generate_hostname: true
  integrations:
    homepage:
      enabled: true
    autodns:
      enabled: true
    traefik:
      enabled: true
      internet_facing: true
      cert_resolver: "ionos"
      entrypoint: "websecure"

stage_overrides:
  prod:
    config:
      generate_hostname: false
      public_domain_name: "fam-feser.de"

# 3. APPLICATION CONFIGURATION (Moved from dot_env)
environment:
  PUID: "1000"
  PGID: "1000"
  TZ: "Europe/Berlin"
  NEXTCLOUD_UPDATE: "1"
  NEXTCLOUD_INIT_LOCK: "true"
  NEXTCLOUD_INIT_HTACCESS: "true"
  NEXTCLOUD_DATA_DIR: "/mnt/data"
  NEXTCLOUD_UPLOAD_MAX_FILESIZE: "10G"
  NEXTCLOUD_MAX_FILE_UPLOADS: "200"
  NEXTCLOUD_TRUSTED_DOMAINS: "cloud.fam-feser.de cloud.int.fam-feser.de nextcloud.fam-feser.de"
  TRUSTED_PROXIES: "10.1.170.4"
  APACHE_DISABLE_REWRITE_IP: "1"
  OVERWRITEHOST: "cloud.fam-feser.de"
  OVERWRITEPROTOCOL: "https"
  OVERWRITECLIURL: "https://cloud.fam-feser.de"
  PHP_MEMORY_LIMIT: "1G"
  PHP_UPLOAD_LIMIT: "10G"
  REDIS_HOST: "aac-nextcloud-redis"
  REDIS_PORT: "6379"

# 4. SECRETS (Moved from stack_env)
secrets:
  NEXTCLOUD_ADMIN_USER: "admin"
  NEXTCLOUD_ADMIN_PASSWORD: "CHANGE_ME"
  MARIADB_DATABASE: "nextcloud"
  MARIADB_USER: "nextcloud"
  MARIADB_PASSWORD: "CHANGE_ME"
  MARIADB_ROOT_PASSWORD: "CHANGE_ME"
  HOMEPAGE_WIDGET_USERNAME: "CHANGE_ME"
  HOMEPAGE_WIDGET_PASSWORD: "CHANGE_ME"

# 5. NETWORK & EXPOSURE
ports:
  - name: "web"
    port: 80
    external_port: 29765
    protocol: "TCP"

# 6. STORAGE DEFINITIONS (Agnostic)
volumes:
  html:
    description: "Nextcloud application and web root"
    target: "/var/www/html"
  db:
    description: "Data for database"
    target: "/var/lib/mysql"
  redis-data:
    description: "Data for redis"
    target: "/data"
  galaxy_01:
    type: "bind"
    source: "/mnt/nextcloud"
    target: "/mnt/data"

# 7. DEPLOYMENT OVERRIDES
deployments:
  docker_compose:
    restart_policy: "always"
    host_base_path: "/export/docker"
    # Main service mounts
    volumes:
      - "html:/var/www/html"
      - "galaxy_01:/mnt/data"

# 8. SIDECAR DEPENDENCIES
dependencies:
  database:
    import: "catalog/mariadb.yml"
    overrides:
      name: "aac-nextcloud-db"
      # renovate: datasource=docker depName=mariadb
      image_tag: "12.3.1-ubi10-rc"
      # Global database credentials are automatically inherited from stack.env
      environment:
        MARIADB_ALLOW_EMPTY_PASSWORD: "false"
        MARIADB_RANDOM_ROOT_PASSWORD: "false"
      
  redis:
    import: "catalog/redis.yml"
    overrides:
      name: "aac-nextcloud-redis"
      # renovate: datasource=docker depName=redis
      image_tag: "8.6.1"