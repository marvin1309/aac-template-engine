# .gitlab-ci.yml

stages:
  - lint
  - test

yaml-syntax-check:
  stage: lint
  image: python:3.14-slim
  before_script:
    - pip install PyYAML
  script:
    - echo "🔎 Checking syntax of all .yml and .yaml files..."
    - |
      find . -type f \( -name "*.yml" -o -name "*.yaml" \) -print0 | xargs -0 -n 1 python -c "import yaml, sys; print(f'-- Checking: {sys.argv[1]}'); yaml.safe_load(open(sys.argv[1]))"
    - echo "✅ Syntax check passed for all YAML files."
  tags:
    - docker

python-unit-tests:
  stage: test
  image: python:3.14-slim
  before_script:
    - pip install pytest pyyaml
    # Ensure the scripts directory is treated as a module
    - export PYTHONPATH=$PYTHONPATH:$(pwd)/scripts
  script:
    - echo "🧪 Running Python Processor Unit Tests..."
    - pytest tests/ -v
  tags:
    - docker