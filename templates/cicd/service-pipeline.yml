# This is a reusable GitLab CI/CD pipeline for service repositories.
# It automates generation, validation, and triggers downstream deployments.

default:
  tags:
    - docker

stages:
  - dev-generate
  - dev-validate
  - dev-deploy
  - dev-promote     # NEW: Auto-MR to Test
  - test-generate
  - test-validate
  - test-deploy
  - test-promote    # NEW: Auto-MR to Main
  - prod-generate
  - prod-validate
  - documentation
  - prod-deploy

# ==========================================================================
# REUSABLE TEMPLATES
# ==========================================================================

.generate-base:
  image: 
    name: registry.gitlab.int.fam-feser.de/aac-application-definitions/aac-template-engine:latest
    pull_policy: always
  # NO before_script. The image already contains the engine and dependencies.
  artifacts:
    paths: [deployments/]
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'

.validate-base:
  image: docker:latest
  services: [docker:dind]
  script:
    - apk add --no-cache docker-compose
    - docker-compose -f deployments/docker_compose/docker-compose.yml config
  artifacts:
    paths: [deployments/]
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'

# NEW: Reusable MR Creator via GitLab API
.auto-promote-base:
  image: curlimages/curl:latest
  script:
    - |
      echo "Creating Merge Request from $SOURCE_BRANCH to $TARGET_BRANCH..."
      # Hit the GitLab API. Write out the HTTP status code so we can handle 409s gracefully.
      RESPONSE=$(curl --silent --output /dev/stderr --write-out "%{http_code}" --request POST --header "PRIVATE-TOKEN: ${CI_GITLAB_TOKEN_GLOBAL_FESER}" \
        --data "source_branch=${SOURCE_BRANCH}&target_branch=${TARGET_BRANCH}&title=🚀 Promotion: ${SOURCE_BRANCH} to ${TARGET_BRANCH}&remove_source_branch=false" \
        "https://${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/merge_requests")
      
      if [ "$RESPONSE" -eq 201 ]; then 
        echo -e "\n✅ Merge Request Created successfully."
      elif [ "$RESPONSE" -eq 409 ]; then 
        echo -e "\nℹ️ Merge Request already exists. Skipping."
      else 
        echo -e "\n❌ Failed to create MR. HTTP Code: $RESPONSE"
        exit 1
      fi

# ==========================================================================
# DEV WORKFLOW (runs on 'dev' branch)
# ==========================================================================
dev-generate-docker-compose:
  extends: .generate-base
  stage: dev-generate
  script:
    - python3 -m manifest_generator.main --ssot-json "service.yml" --template-path "/opt/aac-template-engine" --deployment-type "docker_compose" --stage "dev"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "dev"'
    - if: '$CI_COMMIT_BRANCH == "dev" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'

dev-generate-custom-files:
  extends: .generate-base
  stage: dev-generate
  script:
    - python3 -m manifest_generator.main --ssot-json "service.yml" --template-path "/opt/aac-template-engine" --process-files --stage "dev"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "dev"'
    - if: '$CI_COMMIT_BRANCH == "dev" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'
      exists: [custom_templates/files/**/*]

dev-validate-docker-compose:
  extends: .validate-base
  stage: dev-validate
  needs: [dev-generate-docker-compose]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "dev"'
    - if: '$CI_COMMIT_BRANCH == "dev" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'

# DEV DEPLOY
dev-deploy:
  stage: dev-deploy
  needs: 
    - dev-validate-docker-compose
  trigger:
    project: 'iac-environment/iac-ansible-automation'
    branch: $ANSIBLE_BRANCH
    strategy: depend
  variables:
    SERVICE_NAME: $CI_PROJECT_NAME
    SERVICE_BRANCH: 'dev'
    INVENTORY_BRANCH: $INVENTORY_BRANCH
    # THE MISSING PIECE: Tell Ansible to only run the GitOps role
    DEPLOYMENT_TYPE: 'single_service_trigger' 
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/ && $SKIP_DEPLOYMENT != "true"'

# NEW: Automatically open an MR to 'test' after successful deploy
dev-promote:
  extends: .auto-promote-base
  stage: dev-promote
  needs: [dev-deploy]
  variables:
    SOURCE_BRANCH: "dev"
    TARGET_BRANCH: "test"
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'
      when: on_success
# ==========================================================================
# TEST WORKFLOW (runs on 'test' branch)
# ==========================================================================
test-generate-docker-compose:
  extends: .generate-base
  stage: test-generate
  script:
    - python3 -m manifest_generator.main --ssot-json "service.yml" --template-path "/opt/aac-template-engine" --deployment-type "docker_compose" --stage "dev"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "test"'
    - if: '$CI_COMMIT_BRANCH == "test" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'

test-generate-custom-files:
  extends: .generate-base
  stage: test-generate
  script:
    - python3 -m manifest_generator.main --ssot-json "service.yml" --template-path "/opt/aac-template-engine" --process-files --stage "test"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "test"'
    - if: '$CI_COMMIT_BRANCH == "test" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'
      exists: [custom_templates/files/**/*]

test-validate-docker-compose:
  extends: .validate-base
  stage: test-validate
  needs: [test-generate-docker-compose]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "test"'
    - if: '$CI_COMMIT_BRANCH == "test" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'

# TEST DEPLOY
test-deploy:
  stage: test-deploy
  needs: 
    - test-validate-docker-compose
  trigger:
    project: 'iac-environment/iac-ansible-automation'
    branch: $ANSIBLE_BRANCH
    strategy: depend
  variables:
    SERVICE_NAME: $CI_PROJECT_NAME
    SERVICE_BRANCH: 'test'
    INVENTORY_BRANCH: $INVENTORY_BRANCH
    # THE MISSING PIECE
    DEPLOYMENT_TYPE: 'single_service_trigger'
  rules:
    - if: '$CI_COMMIT_BRANCH == "test" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/ && $SKIP_DEPLOYMENT != "true"'

# NEW: Automatically open an MR to 'main' after test validation succeeds
test-promote:
  extends: .auto-promote-base
  stage: test-promote
  needs: [test-deploy]
  variables:
    SOURCE_BRANCH: "test"
    TARGET_BRANCH: "main"
  rules:
    - if: '$CI_COMMIT_BRANCH == "test" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'
      when: on_success

# ==========================================================================
# PROD WORKFLOW (runs on 'main' branch)
# ==========================================================================
prod-generate-docker-compose:
  extends: .generate-base
  stage: prod-generate
  script:
    - python3 -m manifest_generator.main --ssot-json "service.yml" --template-path "/opt/aac-template-engine" --deployment-type "docker_compose" --stage "dev"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'

prod-generate-custom-files:
  extends: .generate-base
  stage: prod-generate
  script:
    - python3 -m manifest_generator.main --ssot-json "service.yml" --template-path "/opt/aac-template-engine" --process-files --stage "prod"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'
      exists: [custom_templates/files/**/*]

prod-generate-documentation:
  extends: .generate-base
  stage: prod-generate
  resource_group: central_docs_publishing
  script:
    - python3 -m manifest_generator.main --ssot-json "service.yml" --template-path "/opt/aac-template-engine" --process-documentation --stage "prod"
  artifacts:
    paths: [deployments/]
  needs:
    - prod-generate-docker-compose
    - job: prod-generate-custom-files
      optional: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'

prod-validate-docker-compose:
  extends: .validate-base
  stage: prod-validate
  needs: [prod-generate-docker-compose]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'

# PROD DEPLOY
prod-deploy:
  stage: prod-deploy
  needs: 
    - prod-validate-docker-compose
    - prod-generate-documentation
  trigger:
    project: 'iac-environment/iac-ansible-automation'
    branch: $ANSIBLE_BRANCH
    strategy: depend
  variables:
    SERVICE_NAME: $CI_PROJECT_NAME
    SERVICE_BRANCH: 'main'
    INVENTORY_BRANCH: $INVENTORY_BRANCH
    # THE MISSING PIECE
    DEPLOYMENT_TYPE: 'single_service_trigger'
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/ && $SKIP_DEPLOYMENT != "true"'
      when: on_success

# ==========================================================================
# DOCUMENTATION WORKFLOW
# ==========================================================================
publish_to_docs:
  stage: documentation
  resource_group: central_docs_publishing
  image: 
    name: registry.gitlab.int.fam-feser.de/aac-application-definitions/aac-template-engine:latest
    pull_policy: always
  needs:
    - job: prod-generate-documentation
      artifacts: true
  variables:
    DOCS_REPO_URL: "https://gitlab.int.fam-feser.de/documentation/aac-iac-documentation.git"
    DOC_SOURCE_DIR: "deployments/documentation"
  script:
    # Run the generator first (already handled by 'needs' usually, but good to be explicit)
    - python3 -m manifest_generator.main --ssot-json "service.yml" --template-path "/opt/aac-template-engine" --process-documentation --stage "prod"
    # Then run the publisher baked into the image
    - python3 /opt/aac-template-engine/scripts/publish_docs.py
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
# ==========================================================================
# GITLAB PAGES WORKFLOW (Zensical)
# ==========================================================================
pages:
  stage: documentation
  image: 
    name: registry.gitlab.int.fam-feser.de/aac-application-definitions/aac-template-engine:latest
    pull_policy: always
  needs:
    - job: prod-generate-documentation
      artifacts: true
  # NO before_script. Zensical is already installed in the image.
  script:
    - echo "Preparing documentation for GitLab Pages..."
    
    # Verschiebe die fertige MkDocs-Struktur in das aktuelle Verzeichnis
    - if [ -d "deployments/documentation" ]; then cp -r deployments/documentation/* ./ ; fi
    
    # Pre-Flight Check: Abbrechen, falls nichts generiert wurde
    - |
      if [ ! -f "docs/index.md" ]; then
        echo "No documentation generated. Skipping build."
        mkdir public && touch public/index.html
        exit 0
      fi
      
    - echo "Building site with Zensical..."
    - zensical build
    
    # Stelle sicher, dass die Ausgabe im public/ Ordner für GitLab Pages liegt
    - '[ -d "site" ] && mv site public || true'
    - '[ -d ".cache/site" ] && mv .cache/site public || true'
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'