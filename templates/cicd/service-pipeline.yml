# This is a reusable GitLab CI/CD pipeline for service repositories.
# It automates generation, validation, and triggers downstream deployments.
# WARNING: The commit step has been removed. Downstream pipelines MUST retrieve 
# the 'deployments/' directory via CI artifacts, NOT via Git clone.

default:
  tags:
    - docker

stages:
  - dev-generate
  - dev-validate
  - dev-deploy
  - test-generate
  - test-validate
  - test-deploy
  - prod-generate
  - prod-validate
  - documentation
  - prod-deploy

# ==========================================================================
# REUSABLE TEMPLATES (.generate-base, .validate-base)
# ==========================================================================

.generate-base:
  image: 
    name: registry.gitlab.int.fam-feser.de/iac-environment/iac-platform-assets/ansible-ci-image:latest
    pull_policy: always
  before_script:
    - git clone "https://gitlab-ci-token:${CI_GITLAB_TOKEN_GLOBAL_FESER}@${CI_SERVER_HOST}/aac-application-definitions/aac-template-engine.git"
    # Ensure PyYAML and Jinja2 are installed
    - pip install pyyaml jinja2
    # THE CRITICAL FIX: Tell Python exactly where the 'manifest_generator' package lives
    - export PYTHONPATH=$PYTHONPATH:$(pwd)/aac-template-engine/scripts
  artifacts:
    paths: [deployments/]
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'

.validate-base:
  image: docker:latest
  services: [docker:dind]
  script:
    - apk add --no-cache docker-compose
    - docker-compose -f deployments/docker_compose/docker-compose.yml config
  artifacts:
    paths: [deployments/]
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'

# ==========================================================================
# DEV WORKFLOW (runs on 'dev' branch)
# ==========================================================================
dev-generate-docker-compose:
  extends: .generate-base
  stage: dev-generate
  script:
    - python3 -m manifest_generator.main --ssot-json "service.yml" --template-path "aac-template-engine" --deployment-type "docker_compose" --stage "dev"
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'

dev-generate-custom-files:
  extends: .generate-base
  stage: dev-generate
  script:
    - python3 -m manifest_generator.main --ssot-json "service.yml" --template-path "aac-template-engine" --process-files --stage "dev"
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'
      exists: [custom_templates/files/**/*]

dev-generate-documentation:
  extends: .generate-base
  stage: dev-generate 
  script:
    - python3 -m manifest_generator.main --ssot-json "service.yml" --template-path "aac-template-engine" --process-documentation --stage "dev"
  artifacts:
    paths:
      - deployments/
  needs:
    - dev-generate-docker-compose
    - job: dev-generate-custom-files
      optional: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'

dev-validate-docker-compose:
  extends: .validate-base
  stage: dev-validate
  needs: [dev-generate-docker-compose]
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'

dev-deploy:
  stage: dev-deploy
  needs: 
    - dev-validate-docker-compose
    - dev-generate-documentation
  trigger:
    project: 'iac-environment/iac-ansible-automation'
    branch: main
    strategy: depend
  variables:
    SERVICE_NAME: $CI_PROJECT_NAME
    SERVICE_BRANCH: 'dev'
    DEPLOYMENT_TYPE: 'single_service_trigger'
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/ && $SKIP_DEPLOYMENT != "true"'

# ==========================================================================
# TEST WORKFLOW (runs on 'test' branch)
# ==========================================================================
test-generate-docker-compose:
  extends: .generate-base
  stage: test-generate
  script:
    - python3 -m manifest_generator.main --ssot-json "service.yml" --template-path "aac-template-engine" --deployment-type "docker_compose" --stage "test"
  rules:
    - if: '$CI_COMMIT_BRANCH == "test" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'

test-generate-custom-files:
  extends: .generate-base
  stage: test-generate
  script:
    - python3 -m manifest_generator.main --ssot-json "service.yml" --template-path "aac-template-engine" --process-files --stage "test"
  rules:
    - if: '$CI_COMMIT_BRANCH == "test" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'
      exists: [custom_templates/files/**/*]

test-generate-documentation:
  extends: .generate-base
  stage: test-generate 
  script:
    - python3 -m manifest_generator.main --ssot-json "service.yml" --template-path "aac-template-engine" --process-documentation --stage "test"
  artifacts:
    paths:
      - deployments/
  needs:
    - test-generate-docker-compose
    - job: test-generate-custom-files
      optional: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "test" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'

test-validate-docker-compose:
  extends: .validate-base
  stage: test-validate
  needs: [test-generate-docker-compose]
  rules:
    - if: '$CI_COMMIT_BRANCH == "test" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'

test-deploy:
  stage: test-deploy
  needs: 
    - test-validate-docker-compose
    - test-generate-documentation
  trigger:
    project: 'iac-environment/iac-ansible-automation'
    branch: main
    strategy: depend
  variables:
    SERVICE_NAME: $CI_PROJECT_NAME
    SERVICE_BRANCH: 'test'
    DEPLOYMENT_TYPE: 'single_service_trigger'
  rules:
    - if: '$CI_COMMIT_BRANCH == "test" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/ && $SKIP_DEPLOYMENT != "true"'

# ==========================================================================
# PROD WORKFLOW (runs on 'main' branch)
# ==========================================================================
prod-generate-docker-compose:
  extends: .generate-base
  stage: prod-generate
  script:
    - python3 -m manifest_generator.main --ssot-json "service.yml" --template-path "aac-template-engine" --deployment-type "docker_compose" --stage "prod"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'

prod-generate-custom-files:
  extends: .generate-base
  stage: prod-generate
  script:
    - python3 -m manifest_generator.main --ssot-json "service.yml" --template-path "aac-template-engine" --process-files --stage "prod"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'
      exists: [custom_templates/files/**/*]

prod-generate-documentation:
  extends: .generate-base
  stage: prod-generate
  script:
    - python3 -m manifest_generator.main --ssot-json "service.yml" --template-path "aac-template-engine" --process-documentation --stage "prod"
  artifacts:
    paths:
      - deployments/
  needs:
    - prod-generate-docker-compose
    - job: prod-generate-custom-files
      optional: true
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'

prod-validate-docker-compose:
  extends: .validate-base
  stage: prod-validate
  needs: [prod-generate-docker-compose]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'

prod-deploy:
  stage: prod-deploy
  needs: 
    - prod-validate-docker-compose
    - prod-generate-documentation
  trigger:
    project: 'iac-environment/iac-ansible-automation'
    branch: main
    strategy: depend
  variables:
    SERVICE_NAME: $CI_PROJECT_NAME
    SERVICE_BRANCH: 'main'
    DEPLOYMENT_TYPE: 'single_service_trigger'
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/ && $SKIP_DEPLOYMENT != "true"'
      when: on_success

# ==========================================================================
# DOCUMENTATION WORKFLOW
# ==========================================================================
publish_to_docs:
  stage: documentation
  image: 
    name: registry.gitlab.int.fam-feser.de/iac-environment/iac-platform-assets/ansible-ci-image:latest
    pull_policy: always
  needs:
    - job: prod-generate-documentation
      artifacts: true
  before_script:
    - git clone "https://gitlab-ci-token:${CI_GITLAB_TOKEN_GLOBAL_FESER}@${CI_SERVER_HOST}/aac-application-definitions/aac-template-engine.git"
    - export PYTHONPATH=$PYTHONPATH:$(pwd)/aac-template-engine/scripts
  script:
    - python3 aac-template-engine/scripts/publish_docs.py
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'

# ==========================================================================
# GITLAB PAGES WORKFLOW (Zensical)
# ==========================================================================
pages:
  stage: documentation
  image: 
    name: registry.gitlab.int.fam-feser.de/iac-environment/iac-platform-assets/ansible-ci-image:latest
    pull_policy: always
  needs:
    - job: prod-generate-documentation
      artifacts: true
  before_script:
    - pip install --no-cache-dir zensical
  script:
    - echo "Preparing documentation for GitLab Pages..."
    - mkdir -p docs public
    
    # 1. Merge auto-generated documentation into the local docs/ directory
    - |
      if [ -d "deployments/documentation" ]; then
        echo "Merging generated documentation into docs/..."
        cp -r deployments/documentation/* docs/ || true
      fi

    # 2. PRE-FLIGHT CHECK: Do we actually have any markdown files?
    - |
      if [ -z "$(ls -A docs/ 2>/dev/null)" ]; then
        echo "No documentation files found in docs/ or generated artifacts."
        echo "Skipping Pages deployment to prevent build failure."
        # Touching an empty file in public/ satisfies the artifact requirement 
        # without deploying a broken site.
        touch public/index.html
        exit 0
      fi

    # 3. Always Auto-Generate or Override mkdocs.yml for consistency
    - |
      echo "Generating standard mkdocs.yml configuration..."
      cat <<EOF > mkdocs.yml
      site_name: "${CI_PROJECT_NAME} Documentation"
      site_description: "Auto-generated internal documentation"
      site_dir: public
      theme:
        name: material
        features:
          - navigation.tabs
          - navigation.sections
          - toc.integrate
        palette:
          - media: "(prefers-color-scheme: dark)"
            scheme: slate
            primary: indigo
            accent: emerald
            toggle:
              icon: material/weather-sunny
              name: Switch to light mode
          - media: "(prefers-color-scheme: light)"
            scheme: default
            primary: indigo
            accent: emerald
            toggle:
              icon: material/weather-night
              name: Switch to dark mode
      plugins:
        - search
      EOF

    # 4. Build the site
    - echo "Building site with Zensical..."
    - zensical build

    # 5. Fallback move in case Zensical ignores the configuration
    - '[ -d ".cache/site" ] && mv .cache/site/* public/ || true'
    - '[ -d "site" ] && mv site/* public/ || true'
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'