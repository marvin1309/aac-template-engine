# Reusable GitLab CI/CD pipeline for Modular Template Engine v2
default:
  tags:
    - docker

stages:
  - dev-generate
  - dev-validate
  - dev-deploy
  - test-generate
  - test-validate
  - test-deploy
  - prod-generate
  - prod-validate
  - documentation
  - prod-deploy

# ==========================================================================
# REUSABLE TEMPLATES
# ==========================================================================

.generate-base:
  image: 
    name: registry.gitlab.int.fam-feser.de/iac-environment/iac-platform-assets/ansible-ci-image:latest
    pull_policy: always
  before_script:
    - rm -rf aac-template-engine/
    - git clone "https://gitlab-ci-token:${CI_GITLAB_TOKEN_GLOBAL_FESER}@${CI_SERVER_HOST}/aac-application-definitions/aac-template-engine.git"
    - pip install pyyaml jinja2
  artifacts:
    paths: [deployments/]
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'

.validate-base:
  image: docker:latest
  services: [docker:dind]
  script:
    - apk add --no-cache docker-compose
    - docker-compose -f deployments/docker_compose/docker-compose.yml config
  artifacts:
    paths: [deployments/]
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'

# ==========================================================================
# DEV WORKFLOW
# ==========================================================================
dev-generate-docker-compose:
  extends: .generate-base
  stage: dev-generate
  script:
    - cd aac-template-engine/scripts && python3 -m manifest_generator.main --ssot-json "../../service.yml" --template-path ".." --deployment-type "docker_compose" --stage "dev"
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'

dev-generate-documentation:
  extends: .generate-base
  stage: dev-generate 
  script:
    - cd aac-template-engine/scripts && python3 -m manifest_generator.main --ssot-json "../../service.yml" --template-path ".." --process-documentation --stage "dev"
  needs: [dev-generate-docker-compose]
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'

dev-validate-docker-compose:
  extends: .validate-base
  stage: dev-validate
  needs: [dev-generate-docker-compose]
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev"'

dev-deploy:
  stage: dev-deploy
  needs: [dev-validate-docker-compose, dev-generate-documentation]
  trigger:
    project: 'iac-environment/iac-ansible-automation'
    branch: main
    strategy: depend
  variables:
    SERVICE_NAME: $CI_PROJECT_NAME
    SERVICE_BRANCH: 'dev'
    DEPLOYMENT_TYPE: 'single_service_trigger'
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'

# ==========================================================================
# TEST WORKFLOW
# ==========================================================================
test-generate-docker-compose:
  extends: .generate-base
  stage: test-generate
  script:
    - cd aac-template-engine/scripts && python3 -m manifest_generator.main --ssot-json "../../service.yml" --template-path ".." --deployment-type "docker_compose" --stage "test"
  rules:
    - if: '$CI_COMMIT_BRANCH == "test"'

test-generate-documentation:
  extends: .generate-base
  stage: test-generate 
  script:
    - cd aac-template-engine/scripts && python3 -m manifest_generator.main --ssot-json "../../service.yml" --template-path ".." --process-documentation --stage "test"
  needs: [test-generate-docker-compose]
  rules:
    - if: '$CI_COMMIT_BRANCH == "test"'

test-validate-docker-compose:
  extends: .validate-base
  stage: test-validate
  needs: [test-generate-docker-compose]
  rules:
    - if: '$CI_COMMIT_BRANCH == "test"'

test-deploy:
  stage: test-deploy
  needs: [test-validate-docker-compose, test-generate-documentation]
  trigger:
    project: 'iac-environment/iac-ansible-automation'
    branch: main
    strategy: depend
  variables:
    SERVICE_NAME: $CI_PROJECT_NAME
    SERVICE_BRANCH: 'test'
    DEPLOYMENT_TYPE: 'single_service_trigger'
  rules:
    - if: '$CI_COMMIT_BRANCH == "test" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'

# ==========================================================================
# PROD WORKFLOW
# ==========================================================================
prod-generate-docker-compose:
  extends: .generate-base
  stage: prod-generate
  script:
    - cd aac-template-engine/scripts && python3 -m manifest_generator.main --ssot-json "../../service.yml" --template-path ".." --deployment-type "docker_compose" --stage "prod"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

prod-generate-documentation:
  extends: .generate-base
  stage: prod-generate 
  script:
    - cd aac-template-engine/scripts && python3 -m manifest_generator.main --ssot-json "../../service.yml" --template-path ".." --process-documentation --stage "prod"
  needs: [prod-generate-docker-compose]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

prod-validate-docker-compose:
  extends: .validate-base
  stage: prod-validate
  needs: [prod-generate-docker-compose]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

prod-deploy:
  stage: prod-deploy
  needs: [prod-validate-docker-compose, prod-generate-documentation]
  trigger:
    project: 'iac-environment/iac-ansible-automation'
    branch: main
    strategy: depend
  variables:
    SERVICE_NAME: $CI_PROJECT_NAME
    SERVICE_BRANCH: 'main'
    DEPLOYMENT_TYPE: 'single_service_trigger'
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'
      when: manual

# ==========================================================================
# DOCUMENTATION & PAGES
# ==========================================================================
publish_to_docs:
  stage: documentation
  image: 
    name: registry.gitlab.int.fam-feser.de/iac-environment/iac-platform-assets/ansible-ci-image:latest
    pull_policy: always
  needs: [prod-generate-documentation]
  before_script:
    - git clone "https://gitlab-ci-token:${CI_GITLAB_TOKEN_GLOBAL_FESER}@${CI_SERVER_HOST}/aac-application-definitions/aac-template-engine.git"
  script:
    - python3 aac-template-engine/scripts/publish_docs.py
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

pages:
  stage: documentation
  image: 
    name: registry.gitlab.int.fam-feser.de/iac-environment/iac-platform-assets/ansible-ci-image:latest
    pull_policy: always
  needs: [prod-generate-documentation]
  before_script:
    - pip install --no-cache-dir zensical
  script:
    - mkdir -p docs public
    - '[ -d "deployments/documentation" ] && cp -r deployments/documentation/* docs/ || true'
    - |
      cat <<EOF > mkdocs.yml
      site_name: "${CI_PROJECT_NAME} Docs"
      theme: { name: material }
      EOF
    - zensical build
    - '[ -d "site" ] && mv site/* public/ || true'
  artifacts:
    paths: [public]
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'