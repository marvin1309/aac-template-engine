# This is a reusable GitLab CI/CD pipeline for service repositories.
# Optimized for the absolute-path Docker Engine architecture.

default:
  tags:
    - docker

stages:
  - dev-generate
  - dev-validate
  - dev-promote
  - test-generate
  - test-validate
  - test-promote
  - prod-generate
  - prod-validate
  - documentation

# ==========================================================================
# REUSABLE TEMPLATES
# ==========================================================================

.generate-base:
  image: 
    name: registry.gitlab.int.fam-feser.de/aac-application-definitions/aac-template-engine:latest
    pull_policy: always
  artifacts:
    paths: [deployments/]
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'

.validate-base:
  image: docker:latest
  services: [docker:dind]
  script:
    - apk add --no-cache docker-compose
    - docker-compose -f deployments/docker_compose/docker-compose.yml config
  artifacts:
    paths: [deployments/]
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'

.auto-promote-base:
  image: curlimages/curl:latest
  script:
    - |
      echo "Creating Merge Request from $SOURCE_BRANCH to $TARGET_BRANCH..."
      RESPONSE=$(curl --silent --output /dev/stderr --write-out "%{http_code}" --request POST --header "PRIVATE-TOKEN: ${CI_GITLAB_TOKEN_GLOBAL_FESER}" \
        --data "source_branch=${SOURCE_BRANCH}&target_branch=${TARGET_BRANCH}&title=Promotion: ${SOURCE_BRANCH} to ${TARGET_BRANCH}&remove_source_branch=false" \
        "https://${CI_SERVER_HOST}/api/v4/projects/${CI_PROJECT_ID}/merge_requests")
      
      if [ "$RESPONSE" -eq 201 ]; then 
        echo -e "\nMerge Request Created successfully."
      elif [ "$RESPONSE" -eq 409 ]; then 
        echo -e "\nMerge Request already exists. Skipping."
      else 
        echo -e "\nFailed to create MR. HTTP Code: $RESPONSE"
        exit 1
      fi

# ==========================================================================
# DEV WORKFLOW
# ==========================================================================
dev-generate-docker-compose:
  extends: .generate-base
  stage: dev-generate
  script:
    - python3 -m manifest_generator.main --ssot-json "service.yml" --template-path "/opt/aac-template-engine" --deployment-type "docker_compose" --stage "dev"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "dev"'
    - if: '$CI_COMMIT_BRANCH == "dev" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'

dev-generate-custom-files:
  extends: .generate-base
  stage: dev-generate
  script:
    - python3 -m manifest_generator.main --ssot-json "service.yml" --template-path "/opt/aac-template-engine" --process-files --stage "dev"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "dev"'
    - if: '$CI_COMMIT_BRANCH == "dev" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'
      exists: [custom_templates/files/**/*]

dev-validate-docker-compose:
  extends: .validate-base
  stage: dev-validate
  needs: [dev-generate-docker-compose]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "dev"'
    - if: '$CI_COMMIT_BRANCH == "dev" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'

dev-promote:
  extends: .auto-promote-base
  stage: dev-promote
  needs: [dev-validate-docker-compose]
  variables:
    SOURCE_BRANCH: "dev"
    TARGET_BRANCH: "test"
  rules:
    - if: '$CI_COMMIT_BRANCH == "dev" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'
      when: on_success

# ==========================================================================
# TEST WORKFLOW
# ==========================================================================
test-generate-docker-compose:
  extends: .generate-base
  stage: test-generate
  script:
    - python3 -m manifest_generator.main --ssot-json "service.yml" --template-path "/opt/aac-template-engine" --deployment-type "docker_compose" --stage "test"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "test"'
    - if: '$CI_COMMIT_BRANCH == "test" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'

test-generate-custom-files:
  extends: .generate-base
  stage: test-generate
  script:
    - python3 -m manifest_generator.main --ssot-json "service.yml" --template-path "/opt/aac-template-engine" --process-files --stage "test"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "test"'
    - if: '$CI_COMMIT_BRANCH == "test" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'
      exists: [custom_templates/files/**/*]

test-validate-docker-compose:
  extends: .validate-base
  stage: test-validate
  needs: [test-generate-docker-compose]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "test"'
    - if: '$CI_COMMIT_BRANCH == "test" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'

test-promote:
  extends: .auto-promote-base
  stage: test-promote
  needs: [test-validate-docker-compose]
  variables:
    SOURCE_BRANCH: "test"
    TARGET_BRANCH: "main"
  rules:
    - if: '$CI_COMMIT_BRANCH == "test" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'
      when: on_success

# ==========================================================================
# PROD WORKFLOW
# ==========================================================================
prod-generate-docker-compose:
  extends: .generate-base
  stage: prod-generate
  script:
    - python3 -m manifest_generator.main --ssot-json "service.yml" --template-path "/opt/aac-template-engine" --deployment-type "docker_compose" --stage "prod"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'

prod-generate-custom-files:
  extends: .generate-base
  stage: prod-generate
  script:
    - python3 -m manifest_generator.main --ssot-json "service.yml" --template-path "/opt/aac-template-engine" --process-files --stage "prod"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'
      exists: [custom_templates/files/**/*]

prod-generate-documentation:
  extends: .generate-base
  stage: prod-generate
  resource_group: central_docs_publishing
  script:
    - python3 -m manifest_generator.main --ssot-json "service.yml" --template-path "/opt/aac-template-engine" --process-documentation --stage "prod"
  artifacts:
    paths: [deployments/]
  needs:
    - prod-generate-docker-compose
    - job: prod-generate-custom-files
      optional: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'

prod-validate-docker-compose:
  extends: .validate-base
  stage: prod-validate
  needs: [prod-generate-docker-compose]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'

# ==========================================================================
# DOCUMENTATION WORKFLOW
# ==========================================================================
publish_to_docs:
  stage: documentation
  resource_group: central_docs_publishing
  image: 
    name: registry.gitlab.int.fam-feser.de/aac-application-definitions/aac-template-engine:latest
    pull_policy: always
  needs:
    - job: prod-generate-documentation
      artifacts: true
  variables:
    DOCS_REPO_URL: "https://gitlab.int.fam-feser.de/documentation/aac-iac-documentation.git"
    DOC_SOURCE_DIR: "deployments/documentation"
  script:
    - python3 /opt/aac-template-engine/scripts/publish_docs.py
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'

pages:
  stage: documentation
  image: 
    name: registry.gitlab.int.fam-feser.de/aac-application-definitions/aac-template-engine:latest
    pull_policy: always
  needs:
    - job: prod-generate-documentation
      artifacts: true
  script:
    - echo "Preparing documentation for GitLab Pages..."
    - if [ -d "deployments/documentation" ]; then cp -r deployments/documentation/* ./ ; fi
    - |
      if [ ! -f "docs/index.md" ]; then
        echo "No documentation generated. Skipping build."
        mkdir public && touch public/index.html
        exit 0
      fi
    - echo "Building site with Zensical..."
    - zensical build
    - '[ -d "site" ] && mv site public || true'
    - '[ -d ".cache/site" ] && mv .cache/site public || true'
  artifacts:
    paths:
      - public
  rules:
    - if: '$CI_COMMIT_BRANCH == "main" && $CI_COMMIT_MESSAGE !~ /\[skip ci\]/'