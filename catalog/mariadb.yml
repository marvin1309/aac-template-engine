# catalog/mariadb.yml
image_repo: "mariadb"
restart_policy: "always"

# Agnostic Storage Definition
volumes:
  db:
    description: "Primary database storage"
    type: "bind"
    target: "/var/lib/mysql"

# The Bulletproof Healthcheck
healthcheck:
  test: ["CMD-SHELL", "mariadb-admin ping -h localhost --silent || exit 1"]
  interval: "30s"
  timeout: "10s"
  retries: 5
  start_period: "120s"