# catalog/postgres.yml
image_repo: "postgres"
restart_policy: "always"

# Agnostic Storage Definition
volumes:
  db:
    description: "Postgres data directory"
    type: "bind"
    target: "/var/lib/postgresql"

healthcheck:
  test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
  interval: "30s"
  timeout: "5s"
  retries: 5